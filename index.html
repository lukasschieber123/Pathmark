<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Globe</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060A14;
    }
    .maplibregl-ctrl-attrib {
      background: rgba(10, 20, 40, 0.6) !important;
      color: #8aa0b8 !important;
      font-size: 10px !important;
    }
    .maplibregl-ctrl-attrib a { color: #b4cee8 !important; }
    .maplibregl-ctrl-attrib-button {
      width: 14px !important;
      height: 14px !important;
      background-size: 9px 9px !important;
    }
    #labels {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    #pins {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 6;
      overflow: hidden;
    }
    #route-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .label {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: "Times New Roman", Times, serif;
      color: #d8e6f5;
      text-shadow: 0 0 4px #05101f, 0 0 6px #05101f, 0 0 2px #05101f;
      white-space: nowrap;
      user-select: none;
      will-change: transform, left, top;
    }
    .label-country {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-variant: small-caps;
    }
    .label-city { font-size: 10px; }
    .label-town { font-size: 9px; color: #b4c8de; }

    #menu {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      background: rgba(8, 16, 32, 0.85);
      border: 1px solid rgba(180, 200, 230, 0.18);
      border-radius: 4px;
      font-family: "Times New Roman", Times, serif;
      color: #d8e6f5;
      min-width: 200px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .menu-toggle {
      background: none;
      border: none;
      color: #d8e6f5;
      font: inherit;
      font-size: 14px;
      padding: 10px 14px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      letter-spacing: 0.02em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .menu-toggle:hover { color: #fff; }
    .menu-toggle .chev { color: #8aa0b8; font-size: 11px; }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(180, 200, 230, 0.12);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8aa0b8;
    }
    .menu-close {
      background: none; border: none; color: #8aa0b8; cursor: pointer; font-size: 16px; line-height: 1;
    }
    .menu-close:hover { color: #fff; }
    .menu-trips { max-height: 240px; overflow-y: auto; }
    .menu-trip {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      gap: 6px;
    }
    .menu-trip:hover { background: rgba(180, 200, 230, 0.06); }
    .menu-trip.current { background: rgba(245, 145, 51, 0.1); color: #fff; }
    .menu-trip-name { flex: 1; }
    .menu-icon {
      background: none;
      border: none;
      color: #8aa0b8;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 5px;
      line-height: 1;
    }
    .menu-icon:hover { color: #fff; }
    .menu-empty {
      padding: 14px;
      color: #8aa0b8;
      font-style: italic;
      font-size: 12px;
      text-align: center;
    }
    .menu-new {
      background: rgba(245, 145, 51, 0.12);
      color: #f59133;
      border: none;
      border-top: 1px solid rgba(180, 200, 230, 0.12);
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
      width: 100%;
      text-align: left;
      font-size: 13px;
    }
    .menu-new:hover { background: rgba(245, 145, 51, 0.22); }

    .pin {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      width: 22px;
      height: 32px;
      transform: translate(-50%, -100%);
      transition: opacity 0.15s ease;
      will-change: left, top, opacity;
    }
    .pin-stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: linear-gradient(to bottom, #d96420, rgba(217, 100, 32, 0.3));
    }
    .pin-head {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #ffc888, #f59133 55%, #c45414);
      box-shadow: 0 0 10px rgba(245, 145, 51, 0.5), inset 0 0 3px rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pin-number {
      font-family: "Times New Roman", Times, serif;
      font-size: 10px;
      font-weight: 700;
      color: #06122a;
      line-height: 1;
      transition: font-size 0.18s ease;
      pointer-events: none;
    }
    .pin:hover .pin-number { font-size: 14px; }

    #panel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 320px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: rgba(8, 16, 32, 0.92);
      border: 1px solid rgba(180, 200, 230, 0.18);
      border-radius: 4px;
      padding: 16px;
      font-family: "Times New Roman", Times, serif;
      color: #d8e6f5;
      z-index: 20;
      transform: translateX(380px);
      transition: transform 0.25s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-sizing: border-box;
    }
    #panel.open { transform: translateX(0); }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .panel-num {
      background: radial-gradient(circle at 32% 28%, #ffc888, #f59133 55%, #c45414);
      color: #06122a;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .panel-name {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180, 200, 230, 0.18);
      color: #fff;
      font: inherit;
      font-size: 16px;
      padding: 4px 0;
      outline: none;
    }
    .panel-name:focus { border-bottom-color: #f59133; }
    .panel-name::placeholder { color: rgba(180, 200, 230, 0.4); font-style: italic; }
    .panel-close {
      background: none; border: none; color: #8aa0b8; cursor: pointer; font-size: 20px;
      padding: 0 4px; line-height: 1;
    }
    .panel-close:hover { color: #fff; }
    .panel-field { display: block; margin-bottom: 12px; }
    .panel-field > span {
      display: block;
      color: #8aa0b8;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .panel-input, .panel-textarea {
      width: 100%;
      background: rgba(180, 200, 230, 0.05);
      border: 1px solid rgba(180, 200, 230, 0.12);
      border-radius: 3px;
      color: #d8e6f5;
      font: inherit;
      font-size: 13px;
      padding: 6px 8px;
      box-sizing: border-box;
      outline: none;
    }
    .panel-input:focus, .panel-textarea:focus { border-color: rgba(245, 145, 51, 0.5); }
    .panel-textarea {
      min-height: 56px;
      resize: vertical;
      font-family: inherit;
    }
    .panel-delete {
      margin-top: 6px;
      background: rgba(220, 80, 80, 0.1);
      color: #e08080;
      border: 1px solid rgba(220, 80, 80, 0.28);
      border-radius: 3px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      width: 100%;
    }
    .panel-delete:hover { background: rgba(220, 80, 80, 0.2); }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 16, 32, 0.92);
      border: 1px solid rgba(180, 200, 230, 0.18);
      color: #d8e6f5;
      font-family: "Times New Roman", Times, serif;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 3px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #toast.show { opacity: 1; }

    #loader {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(245, 145, 51, 0.85);
      box-shadow: 0 0 6px rgba(245, 145, 51, 0.55);
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #loader.show {
      opacity: 1;
      animation: loaderPulse 1.1s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50%      { transform: scale(0.6); opacity: 0.45; }
    }

    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 16, 0.55);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    .modal {
      background: rgba(8, 16, 32, 0.96);
      border: 1px solid rgba(180, 200, 230, 0.2);
      border-radius: 4px;
      padding: 20px;
      width: 320px;
      max-width: calc(100vw - 32px);
      font-family: "Times New Roman", Times, serif;
      color: #d8e6f5;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
    }
    .modal-message {
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .modal-input {
      width: 100%;
      background: rgba(180, 200, 230, 0.06);
      border: 1px solid rgba(180, 200, 230, 0.2);
      border-radius: 3px;
      color: #fff;
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 16px;
    }
    .modal-input:focus { border-color: rgba(245, 145, 51, 0.55); }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-btn {
      background: transparent;
      border: 1px solid rgba(180, 200, 230, 0.22);
      border-radius: 3px;
      color: #d8e6f5;
      font: inherit;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .modal-btn:hover { border-color: rgba(180, 200, 230, 0.45); }
    .modal-btn.primary {
      background: rgba(245, 145, 51, 0.18);
      border-color: rgba(245, 145, 51, 0.42);
      color: #f59133;
    }
    .modal-btn.primary:hover { background: rgba(245, 145, 51, 0.28); }
    .modal-btn.danger {
      background: rgba(220, 80, 80, 0.16);
      border-color: rgba(220, 80, 80, 0.36);
      color: #e08080;
    }
    .modal-btn.danger:hover { background: rgba(220, 80, 80, 0.26); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="labels"></div>
  <svg id="route-lines" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="route-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
      </filter>
      <filter id="route-shadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      </filter>
    </defs>
  </svg>
  <div id="pins"></div>
  <div id="menu"></div>
  <div id="panel"></div>
  <div id="toast"></div>
  <div id="loader"></div>
  <div id="modal-overlay"></div>

  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
